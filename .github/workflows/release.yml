name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Only one release run per tag. A re-pushed tag (delete + re-push, which fires a
# fresh push event) cancels any in-progress run for that tag instead of spawning
# a second run that would race to create the same GitHub Release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # The git tag is the release version; manifest.json carries the same
      # version for runtime/AnkiWeb visibility. Fail fast if they diverge.
      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(jq -r '.human_version' addon/ci_buddy/manifest.json)"
          if [ "$GITHUB_REF_NAME" != "v$MANIFEST_VERSION" ]; then
            echo "Tag '$GITHUB_REF_NAME' does not match manifest human_version 'v$MANIFEST_VERSION'." >&2
            echo "Bump addon/ci_buddy/manifest.json human_version before tagging." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pytest

      - name: Run unit tests
        working-directory: addon
        run: |
          pytest tests/ -v

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Build addon
        working-directory: addon
        run: ./package.sh

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: addon/ci_buddy.ankiaddon
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
