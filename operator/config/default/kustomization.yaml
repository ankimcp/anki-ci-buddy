apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Full operator install (manager + RBAC + CRD). Apply with Server-Side Apply:
#   kubectl apply --server-side -k config/default
# In argocd, prefer splitting the CRD into its own early-tier app (see config/crd
# and argocd/README.md) so it lands before consumers.
resources:
  - ../crd
  - ../rbac
  - ../manager
