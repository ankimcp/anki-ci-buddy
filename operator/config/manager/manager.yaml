apiVersion: v1
kind: Namespace
metadata:
  name: anki-operator-system
  labels:
    app.kubernetes.io/name: anki-operator
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anki-operator-controller-manager
  namespace: anki-operator-system
  labels:
    app.kubernetes.io/name: anki-operator
    control-plane: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: anki-operator-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: anki-operator:latest
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8443
            - --metrics-secure
            - --namespace=anki-instances
            # --fleet-image must be set to the current headless-anki pod image.
            - --fleet-image=REPLACE_ME/anki:latest
            - --rollout-max-concurrent=20
            # Per-user rclone SIDECAR (ARCHITECTURE §10 layer 3, DECIDED 2026-07-10).
            # Renders a privileged rclone sidecar → the anki-instances namespace MUST
            # be PSA-`privileged` (infra-owned label; docs/contracts.md §4). Set to
            # `external` only for a CSI-provided mount (keeps the pod PSA-baseline).
            - --media-mount-mode=sidecar
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      terminationGracePeriodSeconds: 10
