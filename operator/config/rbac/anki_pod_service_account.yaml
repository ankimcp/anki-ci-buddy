# The zero-permission ServiceAccount the per-user pods run as (ARCHITECTURE §10
# layer 2). It has NO RoleBindings, and pods set automountServiceAccountToken:false,
# so the pod carries no k8s credentials. It lives in the instances namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anki-pod
  namespace: anki-instances
  labels:
    app.kubernetes.io/name: anki-instance
    app.kubernetes.io/managed-by: anki-operator
automountServiceAccountToken: false
