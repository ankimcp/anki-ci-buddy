# Leader-election Lease lives in the operator's OWN namespace (requirements-operator §8).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anki-operator-leader-election-role
  namespace: anki-operator-system
  labels:
    app.kubernetes.io/name: anki-operator
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anki-operator-leader-election-rolebinding
  namespace: anki-operator-system
  labels:
    app.kubernetes.io/name: anki-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: anki-operator-leader-election-role
subjects:
  - kind: ServiceAccount
    name: anki-operator-controller-manager
    namespace: anki-operator-system
